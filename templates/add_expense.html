{% extends "base.html" %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Add New Expense</h1>
                <p class="auth-subtitle">Keep your spending in check by logging your latest transaction.</p>
            </div>>

            {% if error %}
            <div class="auth-error">
                {{ error }}
            </div>>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}" class="auth-form">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <input type="number" step="0.01" name="amount" id="amount" class="form-input" placeholder="0.00" value="{{ amount if amount else '' }}" required>
                </div>>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-input" required>
                        <option value="" disabled {{ 'selected' if not category }}>Select a category</option>
                        <option value="Food" {{ 'selected' if category == 'Food' }}>Food</option>
                        <option value="Transport" {{ 'selected' if category == 'Transport' }}>Transport</option>
                        <option value="Bills" {{ 'selected' if category == 'Bills' }}>Bills</option>
                        <option value="Health" {{ 'selected' if category == 'Health' }}>Health</option>
                        <option value="Entertainment" {{ 'selected' if category == 'Entertainment' }}>Entertainment</option>
                        <option value="Shopping" {{ 'selected' if category == 'Shopping' }}>Shopping</option>
                        <option value="Other" {{ 'selected' if category == 'Other' }}>Other</option>
                    </select>
                </div>>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" name="date" id="date" class="form-input" value="{{ date if date else '' }}" required>
                </div>>

                <div class="form-group">
                    <label for="description">Description (Optional)</label>
                    <input type="text" name="description" id="description" class="form-input" placeholder="What was this for?" value="{{ description if description else '' }}">
                </div>>

                <button type="submit" class="btn-submit">Add Expense</button>
            </form>
        </div>>
    </div>>
</div>>
{% endblock %}
